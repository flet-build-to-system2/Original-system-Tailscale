name: macOS Sequoia GUI via Tailscale

on: 
  workflow_dispatch:

jobs:
  macos-gui:
    runs-on: macos-latest
    steps:
      - name: Install Tailscale
        run: |
          brew install tailscale
          sudo /opt/homebrew/bin/tailscaled --tun=userspace-networking &
          sleep 5
          sudo /opt/homebrew/bin/tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-mac

      - name: Enable Screen Sharing & Virtual Display
        run: |
          # إعداد كلمة مرور الـ VNC
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -client_opts -setvncpasswd -vncpasswd "password123" \
            -restart -agent -privs -all
          
          # السماح بالاتصال من أي مستخدم وتجاوز جدار الحماية
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -allowAccessFor -allUsers -privs -all

      - name: Keep Alive & Log Info
        run: |
          echo "الـ IP الخاص بك هو:"
          /opt/homebrew/bin/tailscale ip -4
          echo "كلمة المرور: password123"
          # إبقاء النظام يعمل
          sleep 21600

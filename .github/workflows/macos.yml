name: macOS GUI Final Fix

on: 
  workflow_dispatch:

jobs:
  macos-gui:
    runs-on: macos-latest
    steps:
      - name: Install Tailscale & Tools
        run: |
          brew install tailscale
          sudo /opt/homebrew/bin/tailscaled --tun=userspace-networking &
          sleep 5
          sudo /opt/homebrew/bin/tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-mac

      - name: Force Enable GUI & VNC
        run: |
          # تفعيل خدمة مشاركة الشاشة بأقصى صلاحيات
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -client_opts -setvncpasswd -vncpasswd "password123" \
            -restart -agent -privs -all
          
          # فتح المنفذ في جدار حماية macOS (مهم جداً)
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --add /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/MacOS/ARDAgent
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off

      - name: Keep Alive
        run: |
          echo "جرب الاتصال الآن عبر VNC"
          /opt/homebrew/bin/tailscale ip -4
          sleep 21600

name: macOS GUI via Tailscale

on: 
  workflow_dispatch:

jobs:
  macos-gui:
    runs-on: macos-13-large
    steps:
      - name: Setup Tailscale (Fixed Paths for ARM)
        run: |
          # 1. تثبيت Tailscale
          brew install tailscale
          
          # 2. تشغيل خدمة tailscaled من المسار الصحيح (ARM path) في الخلفية
          # نستخدم المسار الكامل لضمان الوصول للملف
          sudo /opt/homebrew/bin/tailscaled --tun=userspace-networking &
          
          # الانتظار حتى تبدأ الخدمة
          sleep 5
          
          # 3. تسجيل الدخول باستخدام المفتاح الخاص بك
          sudo /opt/homebrew/bin/tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-mac
          
      - name: Setup VNC
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -client_opts -setvncpasswd -vncpasswd "password123" \
            -restart -agent -privs -all

      - name: Keep Alive
        run: |
          echo "جهاز الماك الآن متصل بشبكة Tailscale الخاصة بك!"
          echo "اسمه في التطبيق هو: github-mac"
          echo "كلمة مرور الـ VNC هي: password123"
          sleep 21600

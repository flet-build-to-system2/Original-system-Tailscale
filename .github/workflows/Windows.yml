name: Windows Original GUI via Tailscale

on: 
  workflow_dispatch:

jobs:
  windows-gui:
    runs-on: windows-latest
    steps:
      - name: Install Tailscale via Chocolatey
        shell: powershell
        run: |
          # تثبيت Tailscale باستخدام مدير الحزم المدمج في ويندوز جيت هاب
          choco install tailscale -y
          
          # الانتظار قليلاً للتأكد من تسجيل المسارات في النظام
          Start-Sleep -Seconds 5
          
          # تشغيل وربط الحساب (نستخدم المسار الافتراضي لـ choco)
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-windows
          
      - name: Enable Remote Desktop (RDP)
        shell: powershell
        run: |
          # تفعيل سطح المكتب البعيد وتجاوز جدار الحماية
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # إعداد كلمة مرور للمستخدم الحالي (runneradmin)
          $Password = ConvertTo-SecureString "Password123!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password

      - name: Keep Alive
        shell: powershell
        run: |
          Write-Host "Windows is ready!"
          & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          # إبقاء السيرفر يعمل لمدة 6 ساعات
          Start-Sleep -Seconds 21600

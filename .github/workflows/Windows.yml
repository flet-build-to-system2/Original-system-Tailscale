name: Windows Original GUI via Tailscale

on: 
  workflow_dispatch:

jobs:
  windows-gui:
    runs-on: windows-latest
    steps:
      - name: Install Tailscale (Fixed)
        shell: powershell
        run: |
          # تحميل النسخة المستقرة من Tailscale لويندوز x64
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-full-latest.exe"
          Write-Host "Downloading Tailscale from $url..."
          Invoke-WebRequest -Uri $url -OutFile "tailscale-setup.exe"
          
          # التحقق من أن الملف تم تحميله بنجاح وحجمه منطقي
          if ((Get-Item "tailscale-setup.exe").Length -lt 1MB) {
              Write-Error "Download failed or file is too small!"
              exit 1
          }

          Write-Host "Installing Tailscale..."
          Start-Process .\tailscale-setup.exe -ArgumentList "/S" -Wait
          
          Write-Host "Connecting to Tailscale..."
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-windows

      - name: Enable Remote Desktop (RDP)
        shell: powershell
        run: |
          # تفعيل سطح المكتب البعيد وتجاوز جدار الحماية
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # إعداد كلمة مرور للمستخدم الحالي (runneradmin)
          $Password = ConvertTo-SecureString "Password123!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password

      - name: Keep Alive
        shell: powershell
        run: |
          Write-Host "Windows is ready!"
          & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          # إبقاء السيرفر يعمل لمدة 6 ساعات
          Start-Sleep -Seconds 21600

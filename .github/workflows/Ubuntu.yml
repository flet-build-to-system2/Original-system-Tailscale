name: Ubuntu Desktop via Tailscale

on: 
  workflow_dispatch:

jobs:
  desktop-gui:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscaled --tun=userspace-networking &
          sleep 5
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-ubuntu

      - name: Install Desktop Environment (XFCE)
        run: |
          sudo apt-get update
          # تثبيت واجهة خفيفة جداً وسريعة
          sudo apt-get install -y xfce4 xfce4-goodies tightvncserver
          
      - name: Setup VNC Server
        run: |
          # إعداد كلمة المرور (password123)
          mkdir -p ~/.vnc
          echo "password123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # تشغيل السيرفر على الشاشة رقم 1 (المنفذ 5901)
          vncserver :1 -geometry 1280x720 -depth 24

      - name: Keep Alive
        run: |
          echo "نظام Ubuntu جاهز الآن!"
          echo "العنوان في VNC Viewer سيكون: [الـ IP الخاص بـ Tailscale]:5901"
          echo "كلمة المرور: password123"
          sleep 21600
